<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀별 월별 예약 리드타임 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden">
    <div id="password-overlay"
        class="fixed inset-0 bg-slate-900 bg-opacity-95 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 text-center">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">대시보드 접근</h2>
            <p class="text-slate-500 mb-6">데이터 확인을 위해 비밀번호를 입력해주세요.</p>
            <form id="password-form" class="space-y-4">
                <input type="password" id="password-input"
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition text-center text-lg"
                    placeholder="비밀번호" required>
                <div id="password-error" class="hidden text-red-500 text-sm font-medium">비밀번호가 올바르지 않습니다.</div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-blue-200">
                    확인
                </button>
            </form>
        </div>
    </div>

    <div class="min-h-screen flex flex-col">

        <!-- Header -->
        <header class="bg-blue-700 shadow-md border-b border-blue-800 p-6 text-white">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex flex-col gap-4">
                    <h1 id="dashboard-title" class="text-2xl font-bold flex items-center gap-2">
                        <span class="w-2 h-8 bg-white rounded-full inline-block"></span>
                        전주대비 예약 증감 대시보드
                    </h1>
                    <div class="flex items-center gap-3">
                        <button id="recent-3-weeks-btn"
                            class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg border border-blue-500 outline-none shadow-sm font-semibold transition">
                            최근 3주 조회
                        </button>
                        <select id="month-select"
                            class="bg-white text-slate-800 px-4 py-2 rounded-lg border border-slate-200 outline-none w-48 shadow-sm">
                            <option value="">월 선택</option>
                            <option value="1">1월</option>
                            <option value="2">2월</option>
                            <option value="3">3월</option>
                            <option value="4">4월</option>
                            <option value="5">5월</option>
                            <option value="6">6월</option>
                            <option value="7">7월</option>
                            <option value="8">8월</option>
                            <option value="9">9월</option>
                            <option value="10">10월</option>
                            <option value="11">11월</option>
                            <option value="12">12월</option>
                        </select>
                    </div>
                </div>
                <div class="text-sm text-blue-200 font-medium">2026 Verygoodtour Report</div>
            </div>
        </header>

        <main class="flex-grow p-6">
            <div class="max-w-7xl mx-auto space-y-6">

                <!-- Dashboard -->
                <div id="dashboard-content" class="hidden space-y-6">

                    <!-- Weekly Totals Summary -->
                    <div id="summary-container"></div>

                    <!-- Team Charts (dynamically generated) -->
                    <div id="teams-container" class="space-y-4"></div>

                </div>



                <div id="status-message" class="text-center py-4 text-slate-400"></div>
            </div>
        </main>

        <footer class="bg-white border-t border-slate-200 py-6">
            <div class="max-w-7xl mx-auto px-6 text-center text-slate-400 text-sm">&copy; 2026 Lead Time Dashboard</div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>

</html>
